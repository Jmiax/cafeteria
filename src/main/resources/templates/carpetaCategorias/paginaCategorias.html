<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catálogo de Categorías</title>

    <div th:replace="~{fragmentos :: bootstrap}"></div>

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div th:replace="~{fragmentos :: menu}"></div>

<div class="container mt-4">
    <!-- HEADER -->
    <div class="page-header">
        <h2>Catálogo de Categorías</h2>
        <p>Listado y administración de categorías de productos</p>
    </div>

    <!-- BOTÓN -->
    <div class="table-header">
        <span class="table-title">Categorías registradas</span>

        <a th:href="@{/rutaCategorias/nuevo}" class="btn-decorative">
            ➕ Nueva Categoría
        </a>
    </div>

    <!-- TABLA -->
    <div class="table-container">

        <table class="custom-table" th:if="${not #lists.isEmpty(categorias)}">

            <thead>
            <tr>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="c : ${categorias}">

                <td th:text="${c.nombre}" class="fw-bold"></td>

                <td th:text="${c.descripcion}"></td>

                <td class="actions">

                    <a th:href="@{/rutaCategorias/editar/{uuid}(uuid=${c.uuid})}"
                       class="btn-edit">
                        ✏️
                    </a>

                    <a th:href="@{/rutaCategorias/eliminar/{uuid}(uuid=${c.uuid})}"
                       class="btn-delete"
                       onclick="return confirm('¿Eliminar esta categoría?');">
                        ❌
                    </a>

                </td>

            </tr>

            </tbody>

        </table>

        <!-- EMPTY STATE -->
        <div th:if="${#lists.isEmpty(categorias)}" class="empty-state">
            <h3>No hay categorías registradas</h3>
            <p>Agrega una nueva categoría para comenzar</p>
        </div>

    </div>

</div>

</body>
</html>
