<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${categoria.uuid == null} ? 'Nueva Categoría' : 'Editar Categoría'"></title>
	<!-- Fragmento Bootstrap -->
	<div th:replace="~{fragmentos :: bootstrap}"></div>
	<!-- Bootstrap Icons -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

	<!-- Navbar Global desde Fragmento -->
	<div th:replace="~{fragmentos :: menu}"></div>

	<div class="container mt-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm border-0">
					<div class="card-header bg-primary text-white py-3">
						<h3 class="card-title h5 mb-0" th:text="${categoria.uuid == null} ? 'Registrar Categoría' : 'Editar Categoría'"></h3>
					</div>
					<div class="card-body p-4">
						
						<!-- Form Action -->
						<form th:action="${categoria.uuid == null} ? @{/rutaCategorias/guardar} : @{/rutaCategorias/actualizar}" th:object="${categoria}" method="post">
							
							<!-- Hidden UUID -->
							<input type="hidden" th:field="*{uuid}" />

							<!-- Nombre -->
							<div class="mb-3">
								<label for="nombre" class="form-label fw-bold">Nombre de la Categoría</label>
								<input type="text" id="nombre" th:field="*{nombre}" class="form-control" th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''" placeholder="Ej. Electrónica" />
								<div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">
									Error en el nombre
								</div>
							</div>

							<!-- Descripción -->
							<div class="mb-4">
								<label for="descripcion" class="form-label fw-bold">Descripción</label>
								<textarea id="descripcion" th:field="*{descripcion}" class="form-control" th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid' : ''" rows="3" placeholder="Descripción breve de la categoría..."></textarea>
								<div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}">
									Error en la descripción
								</div>
							</div>

							<!-- Actions -->
							<div class="d-flex justify-content-end gap-2">
								<a th:href="@{/rutaCategorias/listar}" class="btn btn-outline-secondary">Cancelar</a>
								<button type="submit" class="btn btn-primary">
									<i class="bi bi-save me-1"></i> Guardar
								</button>
							</div>

						</form>

					</div>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
