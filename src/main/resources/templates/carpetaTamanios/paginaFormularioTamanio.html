<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="${tamanio.uuid == null} ? 'Nuevo Tamaño' : 'Editar Tamaño'"></title>

    <th:block th:replace="~{fragmentos :: bootstrap}"></th:block>

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div th:replace="~{fragmentos :: menu}"></div>

<div class="container mt-4">

    <div class="form-card form-producto">


        <div class="form-header text-center">
            <h2 th:text="${tamanio.uuid == null} ? ' Nuevo Tamaño' : 'Editar Tamaño'"></h2>
            <p>Completa la información del tamaño</p>
        </div>

        <form th:action="${tamanio.uuid == null} ? @{/tamanios/guardar} : @{/tamanios/actualizar}"
              th:object="${tamanio}"
              method="post">

            <input type="hidden" th:field="*{uuid}">

            <div class="form-grid">

                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" th:field="*{nombre}">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('nombre')}"
                         th:errors="*{nombre}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Capacidad</label>
                    <input type="number" th:field="*{capacidad}">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('capacidad')}"
                         th:errors="*{capacidad}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Unidad</label>
                    <input type="text" th:field="*{unidad}">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('unidad')}"
                         th:errors="*{unidad}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Descripción</label>
                    <input type="text" th:field="*{descripcion}">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('descripcion')}"
                         th:errors="*{descripcion}">
                    </div>
                </div>

            </div>

            <div class="form-actions">

                <a th:href="@{/tamanios/listar}" class="btn-cancel">
                   Cancelar
                </a>

                <button type="submit" class="btn-form">
                    Guardar Tamaño
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
