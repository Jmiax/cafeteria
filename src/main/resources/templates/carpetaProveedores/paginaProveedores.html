<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <title>Catálogo de Proveedores</title>

    <th:block th:replace="~{fragmentos :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div th:replace="~{fragmentos :: menu}"></div>

<div class="container mt-4">

    <div class="page-header">
        <h2>Catálogo de Proveedores</h2>
        <p>Listado y administración de empresas proveedoras</p>
    </div>

    <div class="table-header">
        <span class="table-title">Proveedores registrados</span>

        <a th:href="@{/rutaProveedores/nuevo}" class="btn-decorative">
            ➕ Nuevo Proveedor
        </a>
    </div>

    <div class="table-container">

        <table class="custom-table" th:if="${not #lists.isEmpty(proveedores)}">

            <thead>
            <tr>
                <th>Empresa</th>
                <th>Teléfono</th>
                <th>Correo</th>
                <th>Dirección</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="p : ${proveedores}">

                <td th:text="${p.nombreEmpresa}" class="fw-bold"></td>
                <td th:text="${p.telefono}"></td>
                <td th:text="${p.correo}"></td>
                <td th:text="${p.direccion}"></td>

                <td class="actions">

                    <a th:href="@{/rutaProveedores/editar/{uuid}(uuid=${p.uuid})}"
                       class="btn-edit">
                        ✏️
                    </a>

                    <a th:href="@{/rutaProveedores/eliminar/{uuid}(uuid=${p.uuid})}"
                       class="btn-delete"
                       onclick="return confirm('¿Eliminar este proveedor?');">
                        ❌
                    </a>

                </td>

            </tr>
            </tbody>

        </table>

        <div th:if="${#lists.isEmpty(proveedores)}" class="empty-state">
            <h3>No hay proveedores registrados</h3>
            <p>Agrega un nuevo proveedor para comenzar</p>
        </div>

    </div>

</div>

</body>
</html>
