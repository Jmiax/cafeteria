<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${proveedor.uuid == null} ? 'Nuevo Proveedor' : 'Editar Proveedor'"></title>
	<!-- Fragmento Bootstrap -->
	<div th:replace="~{fragmentos :: bootstrap}"></div>
	<!-- Bootstrap Icons -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

	<!-- Navbar Global desde Fragmento -->
	<div th:replace="~{fragmentos :: menu}"></div>

	<div class="container mt-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm border-0">
					<div class="card-header bg-primary text-white py-3">
						<h3 class="card-title h5 mb-0" th:text="${proveedor.uuid == null} ? 'Registrar Proveedor' : 'Editar Proveedor'"></h3>
					</div>
					<div class="card-body p-4">
						
						<!-- Form Action -->
						<form th:action="${proveedor.uuid == null} ? @{/rutaProveedores/guardar} : @{/rutaProveedores/actualizar}" th:object="${proveedor}" method="post">
							
							<!-- Hidden UUID -->
							<input type="hidden" th:field="*{uuid}" />

							<!-- Nombre Empresa -->
							<div class="mb-3">
								<label for="nombreEmpresa" class="form-label fw-bold">Nombre de la Empresa</label>
								<input type="text" id="nombreEmpresa" th:field="*{nombreEmpresa}" class="form-control" th:classappend="${#fields.hasErrors('nombreEmpresa')} ? 'is-invalid' : ''" placeholder="Ej. Distribuidora Alfa" />
								<div class="invalid-feedback" th:if="${#fields.hasErrors('nombreEmpresa')}" th:errors="*{nombreEmpresa}">
									Error en el nombre de la empresa
								</div>
							</div>

							<!-- Teléfono -->
							<div class="mb-3">
								<label for="telefono" class="form-label fw-bold">Teléfono de Contacto</label>
								<input type="text" id="telefono" th:field="*{telefono}" class="form-control" th:classappend="${#fields.hasErrors('telefono')} ? 'is-invalid' : ''" placeholder="Ej. 555-9876" />
								<div class="invalid-feedback" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}">
									Error en el teléfono
								</div>
							</div>

							<!-- Correo -->
							<div class="mb-3">
								<label for="correo" class="form-label fw-bold">Correo Electrónico</label>
								<input type="email" id="correo" th:field="*{correo}" class="form-control" th:classappend="${#fields.hasErrors('correo')} ? 'is-invalid' : ''" placeholder="Ej. contacto@alfa.com" />
								<div class="invalid-feedback" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}">
									Error en el correo electrónico
								</div>
							</div>

							<!-- Dirección -->
							<div class="mb-4">
								<label for="direccion" class="form-label fw-bold">Dirección Física</label>
								<input type="text" id="direccion" th:field="*{direccion}" class="form-control" th:classappend="${#fields.hasErrors('direccion')} ? 'is-invalid' : ''" placeholder="Ej. Calle Industrial #456" />
								<div class="invalid-feedback" th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}">
									Error en la dirección
								</div>
							</div>

							<!-- Actions -->
							<div class="d-flex justify-content-end gap-2">
								<a th:href="@{/rutaProveedores/listar}" class="btn btn-outline-secondary">Cancelar</a>
								<button type="submit" class="btn btn-primary">
									<i class="bi bi-save me-1"></i> Guardar
								</button>
							</div>

						</form>

					</div>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
