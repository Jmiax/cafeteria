<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Catálogo de Productos</title>

    <th:block th:replace="~{fragmentos :: bootstrap}"></th:block>

    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div th:replace="~{fragmentos :: menu}"></div>

<div class="container mt-4">

    <!-- HEADER (MISMO ESTILO QUE CATEGORÍAS) -->
    <div class="page-header">
        <h2>Catálogo de Productos</h2>
        <p>Listado y administración de productos de la cafetería</p>
    </div>

    <!-- BOTÓN -->
    <div class="table-header">

        <span class="table-title">Productos registrados</span>

        <a th:href="@{/rutaProductos/nuevo}" class="btn-decorative">
            ➕ Nuevo Producto
        </a>

    </div>

    <!-- TABLA -->
    <div class="table-container">

        <table class="custom-table" th:if="${not #lists.isEmpty(productos)}">

            <thead>
            <tr>
                <th>Imagen</th>
                <th>Descripción</th>
                <th>Existencia</th>
                <th>Estatus</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="producto : ${productos}">

                <td>
                    <img th:if="${producto.imagen != null}"
                         th:src="@{/img/{img}(img=${producto.imagen})}"
                         class="product-img">
                </td>

                <td th:text="${producto.descripcion}" class="fw-bold"></td>

                <td th:text="${producto.existencia}"></td>

                <td>
                    <span class="status-tag" th:text="${producto.estatus}"></span>
                </td>

				<td>

				    <div class="actions">

				        <a th:href="@{'/rutaProductos/editar/' + ${producto.uuid}}"
				           class="btn-edit">
				            ✏️
				        </a>

				        <a th:href="@{'/rutaProductos/eliminar/' + ${producto.uuid}}"
				           class="btn-delete"
				           onclick="return confirm('¿Eliminar este producto?');">
				            ❌
				        </a>

				    </div>

				</td>

            </tr>

            </tbody>

        </table>

        <!-- EMPTY -->
        <div th:if="${#lists.isEmpty(productos)}" class="empty-state">
            <h3>No hay productos registrados</h3>
            <p>Agrega un nuevo producto para comenzar</p>
        </div>

    </div>

</div>

</body>
</html>
