<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Producto</title>
    <th:block th:replace="~{fragmentos :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>

<div th:replace="~{fragmentos :: menu}"></div>

<div class="container mt-4">

    <div class="form-card form-producto">

        <div class="form-header text-center">
            <h2 th:text="${producto.uuid} != null ? 'Editar Producto' : 'Nuevo Producto'"></h2>
            <p>Completa la información del producto</p>
        </div>

        <form th:action="${producto.uuid} == null ? @{/rutaProductos/guardar} : @{/rutaProductos/actualizar}"
              th:object="${producto}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden" th:field="*{uuid}">

            <div class="form-grid">

                <div class="form-group">
                    <label>Descripción</label>
                    <input type="text" th:field="*{descripcion}">
                    <div class="text-danger" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
                </div>

                <div class="form-group">
                    <label>Existencia</label>
                    <input type="number" th:field="*{existencia}">
                    <div class="text-danger" th:if="${#fields.hasErrors('existencia')}" th:errors="*{existencia}"></div>
                </div>

				
				<div class="form-group">
				    <label>Imagen</label>
				    <input type="file" name="archivo" accept=".jpg,.jpeg,.png,.webp">

				    <div th:if="${producto.imagen != null}">
				        <p>Imagen actual:</p>
				        <img th:src="@{'/img/' + ${producto.imagen}}"
				             style="width:120px; margin-top:10px; border-radius:10px;">
				    </div>
				</div>

                <div class="form-group">
                    <label>Estatus</label>
                    <select th:field="*{estatus}">
                        <option th:each="estado : ${estados}"
                                th:value="${estado}"
                                th:text="${estado}">
                        </option>
                    </select>
                    <div class="text-danger" th:if="${#fields.hasErrors('estatus')}" th:errors="*{estatus}"></div>
                </div>

            </div>

            <div class="form-section-box">

                <h4>Preferencias</h4>

                <div class="form-grid">

                    <div>
                        <input type="text" placeholder="Gusta a Daniel" th:field="*{gustaDanielGR}">
                        <div class="text-danger" th:if="${#fields.hasErrors('gustaDanielGR')}" th:errors="*{gustaDanielGR}"></div>
                    </div>

                    <div>
                        <input type="text" placeholder="Gusta a Jaime" th:field="*{gustaJaimeHT}">
                        <div class="text-danger" th:if="${#fields.hasErrors('gustaJaimeHT')}" th:errors="*{gustaJaimeHT}"></div>
                    </div>

                    <div>
                        <input type="text" placeholder="Gusta a Juan Diego" th:field="*{gustaJuanDiegoRV}">
                        <div class="text-danger" th:if="${#fields.hasErrors('gustaJuanDiegoRV')}" th:errors="*{gustaJuanDiegoRV}"></div>
                    </div>

                    <div>
                        <input type="text" placeholder="Gusta a Yishar" th:field="*{gustaYisharJB}">
                        <div class="text-danger" th:if="${#fields.hasErrors('gustaYisharJB')}" th:errors="*{gustaYisharJB}"></div>
                    </div>

                </div>

            </div>

            <div class="form-actions">

                <a th:href="@{/rutaProductos/listar}" class="btn-cancel">
                   Cancelar
                </a>

                <button type="submit" class="btn-form">
                  Guardar Producto
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
